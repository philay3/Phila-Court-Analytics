services:
  postgres:
    image: postgres:17.10
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pca}
      POSTGRES_USER: ${POSTGRES_USER:-pca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pca_local_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
