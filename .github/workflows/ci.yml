name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node (lint, typecheck, test, migrations)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17.10
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: pca_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d pca_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      # No version input: pnpm/action-setup reads the root packageManager field,
      # keeping package.json as the single source of truth for the pnpm version.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Taxonomy generated/ artifacts are gitignored; a fresh clone must
      # regenerate them before typecheck/test can pass.
      - name: Generate taxonomy artifacts
        run: pnpm generate

      # Build the workspace packages to dist/ so the runtime smoke below (and
      # any dist consumer) has emitted output. Idempotent with the build that
      # `pnpm typecheck` runs later.
      - name: Build workspace packages
        run: pnpm run build:packages

      # Execute built dist under PLAIN node — no tsx, no --conditions flag — so
      # the exports `default` (dist) path is exercised end-to-end. Tests resolve
      # source via the `development` condition, so until the Sprint 3 E2E job
      # lands nothing else in CI runs dist; an exports-map or emit-layout mistake
      # would otherwise ship silently. Run from apps/api, which depends on all
      # three packages, so the bare specifiers resolve.
      - name: Plain-node runtime smoke (built dist)
        working-directory: apps/api
        run: >-
          node --input-type=module -e "await import('@pca/shared'); await
          import('@pca/taxonomy'); await import('@pca/db');
          console.log('runtime smoke: all three packages imported under plain node');"

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate taxonomy
        run: pnpm taxonomy:validate

      # Migrations run before tests: the db package's seed idempotency test
      # needs the migrated schema and DATABASE_URL to execute (not skip).
      - name: Apply migrations
        run: pnpm db:migrate:latest
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/pca_ci

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/pca_ci

  e2e:
    name: E2E (Playwright + axe)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17.10
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: pca_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d pca_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # The whole E2E path is env-driven; no DB port is hardcoded anywhere. CI
    # Postgres is 5432 (local Docker is 5433). API_BASE_URL is set explicitly
    # rather than relying on the 15.1 localhost default.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/pca_ci
      API_BASE_URL: http://127.0.0.1:3001
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate taxonomy artifacts
        run: pnpm generate

      # Build workspace packages + the API so the webServer boots the API from
      # built dist under plain node (not tsx) — the production start path.
      - name: Build workspace packages
        run: pnpm run build:packages

      - name: Build API
        run: pnpm --filter @pca/api run build

      # Real migrate + seed (NOT the vitest globalSetup path): the suite runs
      # against deterministic db:seed data.
      - name: Apply migrations
        run: pnpm db:migrate:latest

      - name: Seed database
        run: pnpm db:seed

      # Production web build. Fails loudly if a build-time prerender fetch is
      # ever introduced against the (not-yet-running) API — see task 15.2 F4.
      - name: Build web (production)
        run: pnpm --filter @pca/web run build

      # Cache the chromium browser binary across runs, keyed on the lockfile
      # (which pins the Playwright version). Install OS deps every run; download
      # the browser only on a cache miss.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright chromium (+ deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @pca/e2e exec playwright install --with-deps chromium

      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @pca/e2e exec playwright install-deps chromium

      - name: Run Playwright E2E
        run: pnpm --filter @pca/e2e run test:e2e

  python:
    name: Python (ruff, pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/pipeline
    # Postgres service for the 21.3 loader tests. The repo Kysely migrations are
    # applied to it below (via the real migrator — no hand-maintained SQL, no
    # drift). The loader suite HARD-FAILS if DATABASE_URL is unset in CI, so this
    # env must stay wired.
    services:
      postgres:
        image: postgres:17.10
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: pca_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d pca_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      # uv resolves the Python version from services/pipeline/.python-version.
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: services/pipeline/uv.lock

      - name: Sync dependencies
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # Node/pnpm only to run the canonical Kysely migrator against the service
      # Postgres, so the loader tests write into the real repo schema.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (for the migrator)
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Generate taxonomy artifacts
        working-directory: ${{ github.workspace }}
        run: pnpm generate

      - name: Apply repo migrations to the service Postgres
        working-directory: ${{ github.workspace }}
        run: pnpm db:migrate:latest
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/pca_ci

      - name: Pytest
        run: uv run pytest
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/pca_ci
