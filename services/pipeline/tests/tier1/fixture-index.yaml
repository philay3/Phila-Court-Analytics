# Tier-1 synthetic fixture corpus index (Task 19.1).
#
# One entry per committed fixture, paired 1:1 with a fixture *.txt and a golden
# *.json (golden filename = fixture stem + .json). Hand-authored; validated by
# tests/tier1/test_index.py (1:1 fixture<->index<->golden, expected_warnings a
# subset of the emitted vocabulary minus UNEMITTED_CODES, and each entry's
# expected_warnings / expected_charge_count consistent with its golden).
#
# Fields:
#   filename              fixture file under tests/tier1/fixtures/
#   court_type            "Common Pleas" (CP) | "Municipal Court" (MC); fixes the
#                         placeholder docket the parser is handed at generation
#   scenario              matrix scenario this fixture exercises
#   expected_charge_count charges in the parsed record (0 for a failed parse)
#   expected_warnings     emitted warning codes (envelope observe + parser), a
#                         subset of EMITTED_CODES; [] when none
#   layout_unverified     true only for invented layouts not verified vs real CPCMS
#   synthetic             always true — every tier-1 fixture is synthetic
#
# All docket numbers here and in every fixture/golden are zero-sequence
# placeholders (-0000000- / -0000001-); the hygiene test enforces this across
# the whole tree.

fixtures:
  - filename: single_charge_cp.txt
    court_type: Common Pleas
    scenario: single charge, guilty verdict with probation
    expected_charge_count: 1
    expected_warnings: []
    layout_unverified: false
    synthetic: true

  - filename: single_charge_mc.txt
    court_type: Municipal Court
    scenario: single charge, guilty verdict with confinement
