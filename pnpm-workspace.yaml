packages:
  - 'apps/*'
  - 'packages/*'
  - 'services/*'
  - 'db'
  - 'e2e'
allowBuilds:
  esbuild: true
  # sharp is Next.js's optional native image-optimizer; the shell has no
  # images, so skip its build script. Revisit when images arrive (Sprint 3).
  sharp: false
  # unrs-resolver ships prebuilt platform binaries via optionalDependencies;
  # its postinstall is only a fallback check, so no build script needed.
  unrs-resolver: false
  # Tailwind v4's native Rust engine (@tailwindcss/oxide) builds/fetches a
  # platform binary in its install step; required for CSS compilation.
  '@tailwindcss/oxide': true
  # ffmpeg-static's install step downloads the platform ffmpeg binary the
  # @pca/e2e capture script shells out to for MP4 conversion; without the
  # build the package is an empty shell.
  ffmpeg-static: true
